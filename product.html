<!DOCTYPE html>
<html lang="ar" dir="rtl" data-lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product — BENTRADE</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=IBM+Plex+Mono:wght@400;500&family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
--gold:#c8a84b;--gold-light:#f0d07a;--gold-dim:#7a6230;--gold-glow:rgba(200,168,75,.10);
--bg-deep:#080e14;--bg-card:#0d1820;--bg-card2:#0f1e2a;
--border:#1a2e3e;--border-gold:#3a2e18;
--text-primary:#e8dfc8;--text-secondary:#6a8898;--text-muted:#3a5060;
--green:#2ecc71;--blue:#3498db;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg-deep);color:var(--text-primary);font-family:'Cairo',sans-serif;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(200,168,75,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(200,168,75,.025) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0}

nav{display:flex;align-items:center;justify-content:space-between;padding:12px 32px;border-bottom:.5px solid var(--border);background:rgba(8,14,20,.97);position:sticky;top:0;z-index:100;backdrop-filter:blur(14px)}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;color:var(--gold)}
.nav-left{display:flex;align-items:center;gap:10px}
.back-link{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-secondary);text-decoration:none;padding:6px 12px;border-radius:8px;border:.5px solid var(--border);transition:all .2s}
.back-link:hover{color:var(--text-primary);border-color:var(--gold-dim)}
.lang-btn{padding:6px 14px;border-radius:20px;border:.5px solid var(--border-gold);background:var(--gold-glow);color:var(--gold);font-family:'Syne',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s}
.lang-btn:hover{background:rgba(200,168,75,.2)}

.wrap{max-width:980px;margin:0 auto;padding:32px 24px 80px;position:relative;z-index:1}
.breadcrumb{font-size:11px;color:var(--text-muted);margin-bottom:24px;font-family:'IBM Plex Mono',monospace}
.breadcrumb a{color:var(--text-secondary);text-decoration:none}.breadcrumb a:hover{color:var(--gold)}
.layout{display:grid;grid-template-columns:1fr 360px;gap:32px;align-items:start}

/* FIX: 1:1 square main image */
.main-img-wrap{
  width:100%;
  border-radius:14px;
  border:.5px solid var(--border);
  overflow:hidden;
  background:var(--bg-card2);
  margin-bottom:0;      /* thumbs row sits right below via .thumbs margin */
}
.main-img-wrap img{
  width:100%;
  height:auto;          /* natural aspect ratio — 960x185 banner stays 960x185 ratio */
  display:block;
}
.main-placeholder{
  width:100%;
  min-height:260px;     /* reasonable fallback height when no image */
  background:var(--bg-card2);
  border:.5px solid var(--border-gold);
  border-radius:14px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:12px;
}
.mp-icon{font-size:60px}
.mp-text{font-size:13px;color:var(--text-muted);font-family:'IBM Plex Mono',monospace}

/* Thumbnails: fixed width, height auto = same ratio as source image */
.thumbs{display:flex;gap:10px;margin-top:12px;margin-bottom:28px;flex-wrap:wrap;align-items:flex-start}
.thumb{
  width:80px;
  height:auto;          /* preserves natural aspect ratio of each thumbnail */
  border-radius:8px;
  border:1.5px solid var(--border);
  display:block;
  cursor:pointer;
  transition:border-color .2s;
  flex-shrink:0;
}
.thumb:hover,.thumb.active{border-color:var(--gold)}
.thumb-placeholder{
  width:72px;
  height:72px;
  background:var(--bg-card2);
  border:1.5px dashed var(--border-gold);
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  color:var(--text-muted);
  flex-shrink:0;
}

.info-panel{position:sticky;top:76px}
.panel-card{background:var(--bg-card);border:.5px solid var(--border);border-radius:18px;padding:22px}
.tag-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px}
.tag{font-size:10px;padding:3px 10px;border-radius:20px;font-family:'IBM Plex Mono',monospace;font-weight:500}
.tag-ea{background:rgba(52,152,219,.1);color:var(--blue);border:.5px solid rgba(52,152,219,.2)}
.tag-cat{background:var(--gold-glow);color:var(--gold-light);border:.5px solid var(--border-gold)}
.product-title{font-family:'Syne',sans-serif;font-size:clamp(18px,2.5vw,24px);font-weight:800;line-height:1.2;margin-bottom:12px}
.rating-row{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.star{color:var(--gold);font-size:15px}.star.e{color:var(--border)}
.reviews{font-size:12px;color:var(--text-muted)}
.price-big{font-family:'IBM Plex Mono',monospace;font-size:34px;font-weight:500;color:var(--gold);margin-bottom:4px}
.price-note{font-size:12px;color:var(--text-muted);margin-bottom:20px}
.btn-buy-big{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:15px;border-radius:12px;border:none;background:var(--gold);color:#080e14;font-family:'Cairo',sans-serif;font-size:16px;font-weight:700;text-decoration:none;transition:all .2s;margin-bottom:10px}
.btn-buy-big:hover{background:var(--gold-light)}
.btn-paypal-big{display:flex;align-items:center;justify-content:center;width:100%;padding:13px;border-radius:12px;border:none;background:#0070ba;color:#fff;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;text-decoration:none;transition:background .2s;margin-bottom:14px}
.btn-paypal-big:hover{background:#005ea6}
.secure-badges{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:16px}
.sbadge{font-size:11px;color:var(--text-muted);display:flex;align-items:center;gap:4px}
.divider{height:.5px;background:var(--border);margin:16px 0}
.guarantee{display:flex;align-items:center;gap:10px;padding:12px 14px;background:rgba(46,204,113,.06);border:.5px solid rgba(46,204,113,.2);border-radius:10px;font-size:12px;color:var(--green)}
.section-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--text-primary);margin-bottom:14px;margin-top:28px;display:flex;align-items:center;gap:8px}
.section-title::before{content:'';width:3px;height:15px;background:var(--gold);border-radius:2px}
.desc-text{font-size:14px;color:var(--text-secondary);line-height:1.8}
.feat-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:.5px solid var(--border);font-size:13px;color:var(--text-secondary)}
.feat-item:last-child{border-bottom:none}
.feat-check{width:22px;height:22px;background:rgba(200,168,75,.1);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--gold);flex-shrink:0}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat-box{background:var(--bg-card2);border:.5px solid var(--border);border-radius:10px;padding:14px;text-align:center}
.stat-box .num{font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:500;color:var(--gold)}
.stat-box .lbl{font-size:11px;color:var(--text-muted);margin-top:4px}

[data-lang="en"]{direction:ltr}
@media(max-width:700px){
  nav{padding:10px 14px}
  .layout{grid-template-columns:1fr}
  .info-panel{position:static}
  .wrap{padding:20px 14px 60px}
}
</style>
</head>

const id = new URLSearchParams(window.location.search).get('id') || 'zentra';
const p = PRODUCTS[id];
if (!p) { document.body.innerHTML = '<p style="padding:40px;color:#c8a84b">Product not found</p>'; }

const _readLang = () => {
  const m = document.cookie.match(/(?:^|; )bt_lang=([^;]*)/);
  if (m) return m[1];
  try { return localStorage.getItem('bt_lang') || 'ar'; } catch(e){ return 'ar'; }
};
const _setLang = (l) => {
  document.cookie = 'bt_lang=' + l + '; path=/; max-age=31536000; SameSite=Lax';
  try { localStorage.setItem('bt_lang', l); } catch(e){}
};

let lang = _readLang();

// Avoid direction flash
(function(){
  document.documentElement.setAttribute('lang', lang);
  document.documentElement.setAttribute('dir', lang === 'en' ? 'ltr' : 'rtl');
  document.documentElement.setAttribute('data-lang', lang);
})();

function render() {
  const L = lang;
  document.documentElement.setAttribute('lang', L);
  document.documentElement.setAttribute('dir', L === 'ar' ? 'rtl' : 'ltr');
  document.documentElement.setAttribute('data-lang', L);
  document.getElementById('langBtn').textContent = L === 'ar' ? 'EN' : 'عر';

  document.getElementById('backTxt').textContent = L === 'ar' ? 'العودة للمتجر' : 'Back to Store';
  document.getElementById('bcStore').textContent  = L === 'ar' ? 'المتجر' : 'Store';
  document.getElementById('bcCat').textContent    = L === 'ar' ? 'أدوات التداول' : 'Trading Tools';
  document.getElementById('lblDesc').textContent  = L === 'ar' ? 'وصف المنتج' : 'Product Description';
  document.getElementById('lblFeatures').textContent = L === 'ar' ? 'المميزات' : 'Features';
  document.getElementById('lblStats').textContent = L === 'ar' ? 'الأداء والإحصائيات' : 'Performance & Stats';

  document.title = p.name + ' — BENTRADE';
  document.getElementById('bcName').textContent  = p.name;
  document.getElementById('pName').textContent   = p.name;
  document.getElementById('pDesc').textContent   = p.desc[L];
  document.getElementById('pPrice').textContent  = '$' + p.price;
  document.getElementById('pIcon').textContent   = p.icon;
  document.getElementById('mpText').textContent  = L === 'ar' ? 'أضف صور المنتج في مجلد images/' : 'Add product images to images/ folder';
  document.getElementById('priceLbl').textContent = L === 'ar' ? 'ترخيص دائم — دفع مرة واحدة فقط' : 'Lifetime license — one-time payment';
  document.getElementById('buyTxt').textContent  = L === 'ar' ? 'اشتري الآن' : 'Buy Now';
  document.getElementById('btnPaypal').textContent = L === 'ar' ? 'الدفع عبر PayPal' : 'Pay with PayPal';
  document.getElementById('badge1').textContent  = L === 'ar' ? '✓ PayPal مضمون' : '✓ PayPal Secured';
  document.getElementById('badge2').textContent  = L === 'ar' ? '📦 تسليم فوري' : '📦 Instant Delivery';
  document.getElementById('guaranteeTxt').textContent = L === 'ar'
    ? '🛡️ ضمان استرداد كامل خلال 7 أيام'
    : '🛡️ Full refund guarantee within 7 days';

  // Buttons: checkout for cart flow, paypal for direct pay
  document.getElementById('btnBuy').href = 'checkout.html?product=' + encodeURIComponent(p.name) + '&price=' + p.price + '&id=' + id + '&lang=' + L;
  document.getElementById('btnPaypal').href = p.paypal;

  // Stars
  document.getElementById('pStars').innerHTML =
    Array.from({length:5},(_,i) => `<span class="star${i>=p.stars?' e':''}">★</span>`).join('') +
    `<span class="reviews" style="font-size:12px;color:var(--text-muted);margin-right:8px">(${p.reviews} ${L==='ar'?'تقييم':'reviews'})</span>`;

  // Tags
  document.getElementById('pTags').innerHTML =
    `<span class="tag tag-ea">Expert Advisor</span>
     <span class="tag tag-cat">${p.cat[L]}</span>
     <span class="tag tag-cat">${p.platform[L]}</span>`;

  // Features
  document.getElementById('pFeats').innerHTML = p.features[L].map(f =>
    `<div class="feat-item"><div class="feat-check">✓</div>${f}</div>`).join('');

  // Stats
  document.getElementById('pStats').innerHTML = p.stats[L].map(s =>
    `<div class="stat-box"><div class="num">${s.v}</div><div class="lbl">${s.l}</div></div>`).join('');
}

function toggleLang() {
  lang = lang === 'ar' ? 'en' : 'ar';
  _setLang(lang);
  render();
}

// Gallery with 1:1 square image
function buildGallery() {
  const tr = document.getElementById('thumbsRow');
  const wrap = document.getElementById('mainImgWrap');
  const mi   = document.getElementById('mainImg');
  const ph   = document.getElementById('mainPlaceholder');
  tr.innerHTML = '';

  if (p.imgs && p.imgs.length > 0) {
    ph.style.display = 'none';
    wrap.style.display = 'block';
    mi.src = p.imgs[0];
    mi.alt = p.name;

    p.imgs.forEach((src, i) => {
      const t = document.createElement('img');
      t.src = src;
      t.alt = p.name;
      t.className = 'thumb' + (i === 0 ? ' active' : '');
      t.onclick = () => {
        mi.src = src;
        document.querySelectorAll('.thumb').forEach(x => x.classList.remove('active'));
        t.classList.add('active');
      };
      tr.appendChild(t);
    });
  } else {
    ph.style.display = 'flex';
    wrap.style.display = 'none';
    for (let i = 0; i < 4; i++) {
      const d = document.createElement('div');
      d.className = 'thumb-placeholder';
      d.innerHTML = '📷';
      tr.appendChild(d);
    }
  }
}

render();
buildGallery();
</script>
</body>
</html>
